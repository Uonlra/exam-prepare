<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生成绩管理系统 (SPMS)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-row-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            border-left: 4px solid #667eea;
        }
        
        .results-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result-item {
            padding: 10px;
            background: white;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            font-size: 0.95em;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-button {
            padding: 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab-button.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        table header {
            text-align: left;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #f5576c;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #4facfe;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row, .form-row-4 {
                grid-template-columns: 1fr;
            }
            
            .stat-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .data-controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .data-controls button {
            padding: 10px 15px;
            font-size: 0.9em;
        }
        
        .data-info {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
            grid-column: 1 / -1;
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 0.85em;
            width: auto;
            margin: 0 5px;
        }
        
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 学生成绩管理系统 (SPMS)</h1>
            <p>Student Performance Management System</p>
        </header>
        
        <div id="messageBox"></div>
        
        <!-- 数据控制面板 -->
        <div class="data-controls">
            <button id="exportBtn" class="btn-success btn-small" title="导出数据为JSON文件">💾 导出数据</button>
            <button id="importBtn" class="btn-success btn-small" title="从JSON文件导入数据">📂 导入数据</button>
            <button id="clearBtn" class="btn-secondary btn-small" title="清空所有数据">🗑️ 清空数据</button>
            <button id="saveBtn" class="btn-success btn-small" title="手动保存至浏览器存储">💾 保存</button>
            <div class="data-info">
                <span>📊 已保存学生数: <strong id="studentCount">0</strong> | 💾 数据状态: <strong id="dataStatus">已同步</strong></span>
            </div>
        </div>
        
        <input type="file" id="fileInput" accept=".json" />
            <!-- 添加学生卡片 -->
            <div class="card">
                <h2>➕ 添加学生</h2>
                <form id="addForm">
                    <div class="form-group">
                        <label for="sid">学生编号 (10位数字)</label>
                        <input type="text" id="sid" placeholder="例: 2020010001" maxlength="10" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cid">班级编号</label>
                            <input type="number" id="cid" placeholder="例: 1" min="1" max="20" required>
                        </div>
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" placeholder="例: Alice" maxlength="10" required>
                        </div>
                    </div>
                    <label>成绩 (0-100)</label>
                    <div class="form-row-4">
                        <div class="form-group">
                            <input type="number" id="score1" placeholder="语文" min="0" max="100" required>
                        </div>
                        <div class="form-group">
                            <input type="number" id="score2" placeholder="数学" min="0" max="100" required>
                        </div>
                        <div class="form-group">
                            <input type="number" id="score3" placeholder="英语" min="0" max="100" required>
                        </div>
                        <div class="form-group">
                            <input type="number" id="score4" placeholder="编程" min="0" max="100" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-success">添加学生</button>
                </form>
                <div id="addResults" class="results" style="display:none;"></div>
            </div>
            
            <!-- 删除学生卡片 -->
            <div class="card">
                <h2>🗑️ 删除学生</h2>
                <form id="removeForm">
                    <div class="form-group">
                        <label for="removeSidName">学生编号或姓名</label>
                        <input type="text" id="removeSidName" placeholder="例: 2020010001 或 Alice" required>
                    </div>
                    <button type="submit" class="btn-secondary">删除学生</button>
                </form>
                <div id="removeResults" class="results" style="display:none;"></div>
            </div>
            
            <!-- 查询学生卡片 -->
            <div class="card">
                <h2>🔍 查询学生</h2>
                <form id="queryForm">
                    <div class="form-group">
                        <label for="querySidName">学生编号或姓名</label>
                        <input type="text" id="querySidName" placeholder="例: 2020010001 或 Alice" required>
                    </div>
                    <button type="submit">查询</button>
                </form>
                <div id="queryResults" class="results" style="display:none;"></div>
            </div>
            
            <!-- 统计信息卡片 -->
            <div class="card">
                <h2>📊 统计信息</h2>
                <button id="statBtn" class="btn-success">显示统计</button>
                <div id="statResults" class="results" style="display:none;"></div>
            </div>
        </div>
        
        <!-- 排名卡片 -->
        <div class="card full-width">
            <h2>🏆 学生排名</h2>
            <button id="rankBtn" class="btn-success">显示排名</button>
            <div id="rankResults" class="results" style="display:none;">
                <table id="rankTable">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>学号</th>
                            <th>班级</th>
                            <th>姓名</th>
                            <th>语文</th>
                            <th>数学</th>
                            <th>英语</th>
                            <th>编程</th>
                            <th>总分</th>
                            <th>平均分</th>
                        </tr>
                    </thead>
                    <tbody id="rankTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 数据存储
        let students = [];
        const DB_KEY = 'spms_students_db';
        
        // ============ LocalStorage 相关 ============
        function loadData() {
            const stored = localStorage.getItem(DB_KEY);
            if (stored) {
                try {
                    students = JSON.parse(stored);
                    updateStudentCount();
                    showMessage('✅ 已从本地存储加载数据', 'success');
                } catch(e) {
                    showMessage('❌ 数据加载错误，已清空', 'error');
                    students = [];
                }
            }
        }
        
        function saveData() {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(students));
                updateStudentCount();
                updateDataStatus();
                showMessage('✅ 数据已保存到本地存储', 'success');
            } catch(e) {
                showMessage('❌ 保存失败：' + e.message, 'error');
            }
        }
        
        function updateStudentCount() {
            document.getElementById('studentCount').textContent = students.length;
        }
        
        function updateDataStatus() {
            document.getElementById('dataStatus').textContent = '✅ 已同步';
        }
        
        // ============ 数据导入导出 ============
        document.getElementById('exportBtn').addEventListener('click', function() {
            if (students.length === 0) {
                showMessage('⚠️ 没有数据可导出', 'error');
                return;
            }
            
            const dataStr = JSON.stringify(students, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `spms_data_${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
            
            showMessage('✅ 数据已导出', 'success');
        });
        
        document.getElementById('importBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const imported = JSON.parse(event.target.result);
                    
                    if (!Array.isArray(imported)) {
                        throw new Error('导入数据必须是数组格式');
                    }
                    
                    students = imported;
                    saveData();
                    showMessage(`✅ 成功导入 ${students.length} 个学生`, 'success');
                } catch(error) {
                    showMessage('❌ 导入失败：' + error.message, 'error');
                }
            };
            reader.readAsText(file);
            
            // 重置 file input
            e.target.value = '';
        });
        
        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('⚠️ 确定要清空所有数据吗？此操作无法撤销！')) {
                students = [];
                localStorage.removeItem(DB_KEY);
                updateStudentCount();
                showMessage('🗑️ 所有数据已清空', 'info');
            }
        });
        
        document.getElementById('saveBtn').addEventListener('click', function() {
            saveData();
        });
        
        // ============ 核心功能 ============
        
        // 显示消息
        function showMessage(message, type = 'info') {
            const messageBox = document.getElementById('messageBox');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = message;
            messageBox.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        // 获取总分
        function getTotalScore(scores) {
            return scores.reduce((a, b) => a + b, 0);
        }
        
        // 获取平均分
        function getAvgScore(scores) {
            return (getTotalScore(scores) / 4).toFixed(2);
        }
        
        // 排序学生（按总分从高到低）
        function getSortedStudents() {
            return [...students]
                .sort((a, b) => getTotalScore(b.scores) - getTotalScore(a.scores));
        }
        
        // 获取排名
        function getRank(index) {
            const total = getTotalScore(students[index].scores);
            let rank = 1;
            for (let i = 0; i < students.length; i++) {
                if (i !== index && getTotalScore(students[i].scores) > total) {
                    rank++;
                }
            }
            return rank;
        }
        
        // 添加学生
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sid = document.getElementById('sid').value;
            const cid = parseInt(document.getElementById('cid').value);
            const name = document.getElementById('name').value;
            const scores = [
                parseInt(document.getElementById('score1').value),
                parseInt(document.getElementById('score2').value),
                parseInt(document.getElementById('score3').value),
                parseInt(document.getElementById('score4').value)
            ];
            
            // 检查重复SID
            if (students.some(s => s.sid === sid)) {
                showMessage('❌ 错误：学生编号已存在！', 'error');
                return;
            }
            
            students.push({ sid, cid, name, scores });
            saveData();
            showMessage(`✅ 成功添加学生 ${name} (${sid})`, 'success');
            
            this.reset();
        });
        
        // 删除学生
        document.getElementById('removeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const keyword = document.getElementById('removeSidName').value;
            const initialCount = students.length;
            
            for (let i = students.length - 1; i >= 0; i--) {
                if (students[i].sid === keyword || students[i].name === keyword) {
                    students.splice(i, 1);
                }
            }
            
            const removedCount = initialCount - students.length;
            if (removedCount > 0) {
                saveData();
                showMessage(`✅ 成功删除 ${removedCount} 个学生`, 'success');
            } else {
                showMessage('⚠️ 未找到匹配的学生', 'error');
            }
            
            this.reset();
        });
        
        // 查询学生
        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const keyword = document.getElementById('querySidName').value;
            const resultsDiv = document.getElementById('queryResults');
            
            const found = students.filter(s => s.sid === keyword || s.name === keyword);
            
            if (found.length === 0) {
                showMessage('⚠️ 未找到匹配的学生', 'error');
                resultsDiv.style.display = 'none';
                return;
            }
            
            let html = '<div class="results-title">查询结果：</div>';
            found.forEach(student => {
                const total = getTotalScore(student.scores);
                const avg = getAvgScore(student.scores);
                const rank = getRank(students.indexOf(student));
                html += `
                    <div class="result-item">
                        <strong>排名:</strong> ${rank} | 
                        <strong>学号:</strong> ${student.sid} | 
                        <strong>班级:</strong> ${student.cid} | 
                        <strong>姓名:</strong> ${student.name} | 
                        <strong>成绩:</strong> ${student.scores.join('/')} | 
                        <strong>总分:</strong> ${total} | 
                        <strong>平均分:</strong> ${avg}
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
            
            this.reset();
        });
        
        // 统计信息
        document.getElementById('statBtn').addEventListener('click', function() {
            if (students.length === 0) {
                showMessage('⚠️ 没有学生数据', 'error');
                return;
            }
            
            const subjects = ['语文', '数学', '英语', '编程'];
            const resultsDiv = document.getElementById('statResults');
            let html = '<div class="results-title">统计信息：</div>';
            
            for (let i = 0; i < 4; i++) {
                const scores = students.map(s => s.scores[i]);
                const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2);
                const passed = scores.filter(s => s >= 60).length;
                const failed = scores.length - passed;
                
                html += `
                    <div class="result-item">
                        <strong>${subjects[i]}</strong><br>
                        平均分: ${avg} | 及格: ${passed} | 不及格: ${failed}
                    </div>
                `;
            }
            
            // 总体统计
            let pass_all = 0, pass_3 = 0, pass_2 = 0, pass_1 = 0, fail_all = 0;
            students.forEach(s => {
                const passCount = s.scores.filter(sc => sc >= 60).length;
                if (passCount === 4) pass_all++;
                if (passCount >= 3) pass_3++;
                if (passCount >= 2) pass_2++;
                if (passCount >= 1) pass_1++;
                if (passCount === 0) fail_all++;
            });
            
            html += `
                <div class="result-item" style="background: #e7f3ff; border-left-color: #4facfe;">
                    <strong>总体统计：</strong><br>
                    全科及格: ${pass_all} | 3科及格: ${pass_3} | 2科及格: ${pass_2} | 
                    1科及格: ${pass_1} | 全部不及格: ${fail_all}
                </div>
            `;
            
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
        });
        
        // 显示排名
        document.getElementById('rankBtn').addEventListener('click', function() {
            if (students.length === 0) {
                showMessage('⚠️ 没有学生数据', 'error');
                return;
            }
            
            const resultsDiv = document.getElementById('rankResults');
            const tbody = document.getElementById('rankTableBody');
            tbody.innerHTML = '';
            
            const sorted = getSortedStudents();
            sorted.forEach((student, index) => {
                const studentIndex = students.indexOf(student);
                const rank = getRank(studentIndex);
                const total = getTotalScore(student.scores);
                const avg = getAvgScore(student.scores);
                
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${rank}</td>
                    <td>${student.sid}</td>
                    <td>${student.cid}</td>
                    <td>${student.name}</td>
                    <td>${student.scores[0]}</td>
                    <td>${student.scores[1]}</td>
                    <td>${student.scores[2]}</td>
                    <td>${student.scores[3]}</td>
                    <td><strong>${total}</strong></td>
                    <td><strong>${avg}</strong></td>
                `;
            });
            
            resultsDiv.style.display = 'block';
            showMessage(`✅ 显示 ${students.length} 个学生的排名`, 'success');
        });
        
        // 页面加载时读取数据
        window.addEventListener('load', function() {
            loadData();
        });
        
        // 页面卸载时自动保存数据
        window.addEventListener('beforeunload', function(e) {
            if (students.length > 0) {
                localStorage.setItem(DB_KEY, JSON.stringify(students));
            }
        });
    </script>
</body>
</html>
